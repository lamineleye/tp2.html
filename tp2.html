<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tp2</title>
    <style>
        .seg1{
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid black;
            padding: 10px;
            align-items: center;
            
        }
        .cercle{
            border: 2px solid black;
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }
        .grandbarre{
            width: 35%;
            height: 50px;
            align-items: center;
            display: flex;
            justify-content: space-around;
        }
        .barre{
            border: 2px solid black;
            border-radius: 10px;
            width: 30%;
            height: 20px;
            margin: 10px;
        }
        .seg2{
            width: 94%;
            height: 300px;
            border: 2px solid black;
            border-radius: 10px;
            margin: 20px auto;
        }
        .espace{
            width: 150px;
            height: 20px;
            border: 2px solid black;
            border-radius: 12px;
            margin: 0 auto ;
        }
        .seg3{
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 10px;
            gap: 10px;
            margin: 20px auto;
        }
        .rect{
            width: 45%;
            height: 200px;
            border: 2px solid black;
            border-radius: 10px;
        }
        .seg4{
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 10px;
            gap: 10px;
            margin: 20px auto;
        }
        .carre{
            width: 28%;
            height: 200px;
            border: 2px solid black;
            border-radius: 10px;
        }
        .seg5{
            display: flex;
            justify-content: space-around;
            width: 98%;
            height: 200px;
            margin: 30px auto ;
        }
        .ptc{
            width: 21%;
            height: 150px;
            border: 2px solid black;
            border-radius: 10px;
        }
        .seg6{
            width: 94%;
            height: 200px;
            border: 2px solid black;
            border-radius: 10px;
            margin: 0 auto;
        }
        .seg7{
            width: 180px;
            height: 20px;
            display: flex;
            margin: 20px auto;
        }
        .mini{
            width: 15px;
            height: 15px;
            border: 2px solid black;
            border-radius: 50%;
            margin: 10px auto;
        }
        .seg8{
            width: 94%;
            height: 80px;
            border: 2px solid black;
            border-radius: 10px;
            margin: 80px auto;
        }
    </style>
</head>
<body>
    <div class="seg1">
        <div class="cercle"></div>
        <div class="grandbarre">
            <div class="barre"></div>
            <div class="barre"></div>
            <div class="barre"></div>
            <div class="barre"></div>  
        </div>
    </div>
    <div class="seg2">
        
    </div>
    <div class="espace"></div>
    <div class="seg3">
        <div class="rect"></div>
        <div class="rect"></div>
        <div class="rect"></div>
        <div class="rect"></div>
    </div>
    <div class="espace"></div>
    <div class="seg4">
            <div class="carre"></div>
            <div class="carre"></div>
            <div class="carre"></div>
            <div class="carre"></div>
            <div class="carre"></div>
            <div class="carre"></div>
    </div>
    <div class="espace"></div>
    <div class="seg5">
        <div class="ptc"></div>
        <div class="ptc"></div>
        <div class="ptc"></div>
        <div class="ptc"></div>
    </div>
    <div class="seg6"></div>
    <div class="seg7">
        <div class="mini"></div>
        <div class="mini"></div>
        <div class="mini"></div>
        <div class="mini"></div>
    </div>
    <div class="seg8"></div>
</body>
</html>
